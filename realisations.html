var AUTO=5000;
var box=document.getElementById('baBox'),
    imgA=document.getElementById('baAfter'),
    imgB=document.getElementById('baBefore'),
    ln=document.getElementById('baLine'),
    hnd=document.getElementById('baHandle'),
    cap=document.getElementById('baCap'),
    fillEl=document.getElementById('baFill'),
    dots=document.getElementById('baDots'),
    prev=document.getElementById('baPrev'),
    next=document.getElementById('baNext');

var cur=0, pct=50, drag=false, timer=null;

/* Build dots */
SLIDES.forEach(function(_,i){
  var d=document.createElement('button');
  d.className='ba-dot'+(i===0?' on':'');
  d.addEventListener('click',function(){userNav(i)});
  dots.appendChild(d);
});

/* Position */
function setPos(p){
  pct=Math.max(2,Math.min(98,p));
  imgB.style.clipPath='inset(0 '+(100-pct)+'% 0 0)';
  ln.style.left=pct+'%';
  hnd.style.left=pct+'%';
}

function animCenter(){
  imgB.classList.add('smooth');
  setPos(50);
  setTimeout(function(){imgB.classList.remove('smooth')},950);
}

/* Load */
function loadSlide(i){
  var s=SLIDES[i];
  function ld(img,src,fb){img.onerror=function(){img.onerror=null;img.src=fb};img.src=src}
  ld(imgA,s.after,'https://via.placeholder.com/900x506/22201a/d5a541?text=APRES');
  ld(imgB,s.before,'https://via.placeholder.com/900x506/16140e/c49518?text=AVANT');
  cap.textContent=s.caption;
  document.querySelectorAll('.ba-dot').forEach(function(d,j){d.classList.toggle('on',j===i)});
  animCenter();
}

/* Progress bar */
function startFill(){
  fillEl.style.transition='none';
  fillEl.style.width='0%';
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    fillEl.style.transition='width '+AUTO+'ms linear';
    fillEl.style.width='100%';
  })});
}
function stopFill(){fillEl.style.transition='none';fillEl.style.width='0%'}

/* Auto */
function startAuto(){clearTimeout(timer);startFill();timer=setTimeout(function(){cur=(cur+1)%SLIDES.length;loadSlide(cur);startAuto()},AUTO)}
function stopAuto(){clearTimeout(timer);stopFill()}

function userNav(i){stopAuto();cur=(i+SLIDES.length)%SLIDES.length;loadSlide(cur);startAuto()}

/* Drag */
function cx(e){return e.touches?e.touches[0].clientX:e.clientX}

function onStart(e){
  if(e.cancelable)e.preventDefault();
  drag=true;stopAuto();
  imgB.classList.remove('smooth');
  box.classList.add('drag');
}
function onMove(e){
  if(!drag)return;
