<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réalisations</title>
<style>
body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.before-after{
position:relative;
width:100%;
height:220px;
overflow:hidden;
border-radius:8px;
}

.before-after img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.after{
width:50%;
overflow:hidden;
}

.before-after:hover .after{
width:100%;
transition:0.6s;
}

.label{
position:absolute;
bottom:10px;
left:10px;
background:black;
color:white;
padding:4px 8px;
font-size:12px;
border-radius:4px;
}

.label.after-label{
left:auto;
right:10px;
}
</style>
</head>

<body>

<h1>Nos Réalisations</h1>

<div class="gallery">

<div class="card">
<div class="before-after">
<img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e" alt="avant">
<div class="after">
<img src="https://images.unsplash.com/photo-1502005229762-cf1b2da7c5d6" alt="apres">
</div>
<div class="label">Avant</div>
<div class="label after-label">Après</div>
</div>
</div>

<div class="card">
<div class="before-after">
<img src="https://images.unsplash.com/photo-1501045661006-fcebe0257c3f" alt="avant">
<div class="after">
<img src="https://images.unsplash.com/photo-1484154218962-a197022b5858" alt="apres">
</div>
<div class="label">Avant</div>
<div class="label after-label">Après</div>
</div>
</div>

<div class="card">
<div class="before-after">
<img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511" alt="avant">
<div class="after">
<img src="https://images.unsplash.com/photo-1493809842364-78817add7ffb" alt="apres">
</div>
<div class="label">Avant</div>
<div class="label after-label">Après</div>
</div>
</div>

<div class="card">
<div class="before-after">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c" alt="avant">
<div class="after">
<img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c" alt="apres">
</div>
<div class="label">Avant</div>
<div class="label after-label">Après</div>
</div>
</div>

</div>

</body>
</html>
